<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <link rel="stylesheet" href="./css/social.css">
    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <div class="body-wrapper">
      <div class="main-container">
        <main>
          <div>
            <section id="profile-info">
              <div id="image-wrapper">
                <img src="./assets/images/avatar-jessica.jpeg" alt="jessica-avatar" width="80px" height="80px">
              </div>
              <div class="profile-text">
                <h1 class="name">Jessica Randall</h1>
                <p class="address">London, United Kingdom</p>
                <p>"Front-end developer and avid reader."</p>
              </div>
            </section>
          </div>
          <div>
            <section id="social-profiles">
              <ul>
                <li class="social"><a href="#">GitHub</a></li>
                <li class="social"><a href="#">Frontend Mentor</a></li>
                <li class="social"><a href="#">LinkedIn</a></li>
                <li class="social"><a href="#">Twitter</a></li>
                <li class="social"><a href="#">Instagram</a></li>
              </ul>
            </section>
          </div>
        </main>
      </div>
      <div class="footer-wrapper">
        <footer>
          <p>
            Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
            Coded by <a href="#">Leroy Mends</a>.
          </p>
        </footer>
      </div>
    </div>
  </body>
</html>
